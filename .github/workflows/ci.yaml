name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  commitlint:
    name: commitlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate conventional commits
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            git log -1 --pretty=%B | pnpm exec commitlint
          else
            pnpm exec commitlint --from "$BASE_SHA" --to "$HEAD_SHA" --verbose
          fi

  backend:
    name: backend
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql+psycopg://prompteer:prompteer@localhost:5432/postgres
      REDIS_URL: redis://localhost:6379/0
      RATE_LIMIT_STORAGE_URL: redis://localhost:6379/0
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: prompteer
          POSTGRES_PASSWORD: prompteer
          POSTGRES_DB: postgres
          TZ: UTC
          PGTZ: UTC
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U prompteer -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true
      - run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client
      - run: uv sync --project apps/api --dev
      - run: cd apps/api && uv run ruff check .
      - run: cd apps/api && uv run ruff format --check .
      - run: cd apps/api && uv run mypy app tests
      - run: cd apps/api && uv run pytest
      - run: make migration-check
        env:
          MAINTENANCE_DATABASE_URL: postgresql://prompteer:prompteer@localhost:5432/postgres
          MIGRATION_DATABASE_URL: postgresql://prompteer:prompteer@localhost:5432/prompteer_migration_check
      - run: make backup-restore-check
        env:
          MAINTENANCE_DATABASE_URL: postgresql://prompteer:prompteer@localhost:5432/postgres
          SOURCE_DATABASE_URL: postgresql://prompteer:prompteer@localhost:5432/prompteer_backup_source
          RESTORE_DATABASE_URL: postgresql://prompteer:prompteer@localhost:5432/prompteer_backup_restore
      - name: Backend coverage summary
        if: always()
        run: |
          cd apps/api
          if [ -f .coverage ]; then
            echo "### Backend coverage" >> "$GITHUB_STEP_SUMMARY"
            uv run coverage report --format=markdown >> "$GITHUB_STEP_SUMMARY"
          fi

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level moderate
      - run: uv sync --project apps/api --dev
      - run: make types-check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  integration:
    name: integration
    runs-on: ubuntu-latest
    env:
      HTTP_PORT: 8080
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: cp .env.example .env
      - run: docker compose up -d
      - run: make compose-health
      - name: Verify Compose health endpoints
        run: |
          curl --fail --silent --show-error http://localhost:${HTTP_PORT}/api/v1/health/live
          curl --fail --silent --show-error http://localhost:${HTTP_PORT}/api/v1/health/ready
          curl --fail --silent --show-error http://localhost:${HTTP_PORT}/api/v1/health/startup
          curl --fail --location --silent --show-error http://localhost:${HTTP_PORT}/
      - name: Verify readiness diagnostics during Redis outage
        run: make readiness-outage-check
      - run: pnpm --filter @prompteer/web exec playwright install --with-deps chromium
      - name: Run Playwright against Compose
        run: pnpm --filter @prompteer/web test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:8080
      - name: Capture Compose logs
        if: always()
        run: |
          mkdir -p .verify
          docker compose ps > .verify/compose-ps.txt || true
          docker compose logs --no-color > .verify/compose.log || true
      - name: Upload integration artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: integration-artifacts
          if-no-files-found: ignore
          path: |
            .verify/compose-ps.txt
            .verify/compose.log
            apps/web/playwright-report/
            apps/web/test-results/
      - name: Stop Compose
        if: always()
        run: docker compose down -v

  dev-contract:
    name: fresh clone dev contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true
      - run: cp .env.example .env
      - run: scripts/compose-up.sh postgres redis
      - name: Start pnpm dev from fresh checkout
        run: |
          set -euo pipefail
          mkdir -p .verify
          setsid pnpm dev > .verify/pnpm-dev.log 2>&1 &
          dev_pid=$!
          cleanup() {
            kill -TERM "-$dev_pid" >/dev/null 2>&1 || true
            kill "$dev_pid" >/dev/null 2>&1 || true
            wait "$dev_pid" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          for _ in $(seq 1 120); do
            if curl --fail --silent --show-error http://localhost:3000/api/health >/dev/null \
              && curl --fail --silent --show-error http://localhost:8000/api/v1/health/live >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat .verify/pnpm-dev.log
          exit 1
      - name: Start pnpm dev:legacy from fresh checkout
        run: |
          set -euo pipefail
          mkdir -p .verify
          setsid pnpm dev:legacy > .verify/pnpm-dev-legacy.log 2>&1 &
          dev_pid=$!
          cleanup() {
            kill -TERM "-$dev_pid" >/dev/null 2>&1 || true
            kill "$dev_pid" >/dev/null 2>&1 || true
            wait "$dev_pid" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          for _ in $(seq 1 120); do
            if curl --fail --silent --show-error http://localhost:3000/api/health >/dev/null \
              && curl --fail --silent --show-error http://localhost:3001/en >/dev/null \
              && curl --fail --silent --show-error http://localhost:8000/api/v1/health/live >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat .verify/pnpm-dev-legacy.log
          exit 1
      - name: Capture dev contract logs
        if: always()
        run: |
          docker compose ps > .verify/dev-contract-compose-ps.txt || true
          docker compose logs --no-color > .verify/dev-contract-compose.log || true
      - name: Upload dev contract artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dev-contract-artifacts
          if-no-files-found: ignore
          path: |
            .verify/pnpm-dev.log
            .verify/pnpm-dev-legacy.log
            .verify/dev-contract-compose-ps.txt
            .verify/dev-contract-compose.log
      - name: Stop Compose
        if: always()
        run: docker compose down -v
