name: Build Images

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build web image
        run: docker build -f apps/web/Dockerfile -t ghcr.io/${{ github.repository_owner }}/prompteer-web:latest .
      - name: Build api image
        run: docker build -f apps/api/Dockerfile -t ghcr.io/${{ github.repository_owner }}/prompteer-api:latest .
