name: Build Images

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  verify:
    name: required verification
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - run: pnpm install --frozen-lockfile
      - run: uv sync --project apps/api --dev
      - run: cp .env.example .env
      - run: pnpm format:check
      - run: make env-check
      - run: make audit
      - run: make lint
      - run: make typecheck
      - run: make test
      - run: make types-check
      - run: make build
      - name: Stop verification services
        if: always()
        run: docker compose down -v

  build:
    name: build and publish images
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set image tags
        run: |
          short_sha="${GITHUB_SHA::7}"
          lower_owner="${GITHUB_REPOSITORY_OWNER,,}"
          web_image="ghcr.io/${lower_owner}/prompteer-web"
          api_image="ghcr.io/${lower_owner}/prompteer-api"

          {
            echo "WEB_IMAGE_TAGS<<EOF"
            echo "${web_image}:latest"
            echo "${web_image}:sha-${short_sha}"
            if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
              echo "${web_image}:${GITHUB_REF_NAME}"
            fi
            echo "EOF"
            echo "API_IMAGE_TAGS<<EOF"
            echo "${api_image}:latest"
            echo "${api_image}:sha-${short_sha}"
            if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
              echo "${api_image}:${GITHUB_REF_NAME}"
            fi
            echo "EOF"
          } >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build web image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ env.WEB_IMAGE_TAGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build api image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ env.API_IMAGE_TAGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
