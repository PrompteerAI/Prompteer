name: Build Images

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  verify:
    name: required verification
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Locate pnpm store
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('apps/api/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-
      - run: pnpm install --frozen-lockfile
      - run: uv sync --project apps/api --dev
      - run: cp .env.example .env
      - name: Configure CI host volume permissions
        run: echo "PROMPTEER_HOST_GID=$(id -g)" >> "$GITHUB_ENV"
      - run: pnpm format:check
      - run: make env-check
      - run: make audit
      - run: make lint
      - run: make typecheck
      - run: make test
      - run: make types-check
      - run: make build
      - run: pnpm --filter @prompteer/web exec playwright install --with-deps chromium
      - name: Run Compose e2e gate
        run: make e2e
      - name: Reset UI verification state
        run: |
          scripts/compose-down.sh -v
          if ! rm -rf .mock/email; then
            sudo rm -rf .mock/email
          fi
      - name: Verify primary UI screenshots
        run: make verify-ui-primary PROMPTEER_UPDATE_README_SCREENSHOTS=0
      - name: Verify legacy-preview UI screenshots
        run: make verify-ui-legacy
      - name: Check README screenshot assets
        run: node scripts/check-ui-screenshots.mjs
      - name: Upload verification artifacts
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: build-verification-artifacts
          if-no-files-found: ignore
          include-hidden-files: true
          path: |
            .verify/
            apps/web/playwright-report/
            apps/web/test-results/
      - name: Stop verification services
        if: always()
        run: docker compose down -v

  build:
    name: build and publish images
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set image tags
        run: |
          short_sha="${GITHUB_SHA::7}"
          lower_owner="${GITHUB_REPOSITORY_OWNER,,}"
          web_image="ghcr.io/${lower_owner}/prompteer-web"
          api_image="ghcr.io/${lower_owner}/prompteer-api"

          {
            echo "WEB_IMAGE_TAGS<<EOF"
            echo "${web_image}:latest"
            echo "${web_image}:sha-${short_sha}"
            if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
              echo "${web_image}:${GITHUB_REF_NAME}"
            fi
            echo "EOF"
            echo "API_IMAGE_TAGS<<EOF"
            echo "${api_image}:latest"
            echo "${api_image}:sha-${short_sha}"
            if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
              echo "${api_image}:${GITHUB_REF_NAME}"
            fi
            echo "EOF"
          } >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build web image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ env.WEB_IMAGE_TAGS }}
          build-args: |
            APP_VERSION=${{ github.sha }}
            PUBLIC_ORIGIN=https://prompteer.example.invalid
            NEXT_PUBLIC_API_URL=https://prompteer.example.invalid/api/v1
            NEXT_PUBLIC_APP_VERSION=${{ github.sha }}
            NEXT_PUBLIC_USE_MOCK_GOOGLE=false
            NEXT_PUBLIC_SENTRY_DSN=
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build api image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ env.API_IMAGE_TAGS }}
          build-args: |
            APP_VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
