name: Build Images

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  verify:
    name: required verification
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true
      - run: pnpm install --frozen-lockfile
      - run: uv sync --project apps/api --dev
      - run: cp .env.example .env
      - run: pnpm format:check
      - run: make env-check
      - run: make audit
      - run: make lint
      - run: make typecheck
      - run: make test
      - run: make types-check
      - run: make build
      - name: Stop verification services
        if: always()
        run: docker compose down -v

  build:
    name: build and publish images
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set image tags
        run: |
          short_sha="${GITHUB_SHA::7}"
          lower_owner="${GITHUB_REPOSITORY_OWNER,,}"
          web_image="ghcr.io/${lower_owner}/prompteer-web"
          api_image="ghcr.io/${lower_owner}/prompteer-api"

          {
            echo "WEB_IMAGE_TAGS<<EOF"
            echo "${web_image}:latest"
            echo "${web_image}:sha-${short_sha}"
            if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
              echo "${web_image}:${GITHUB_REF_NAME}"
            fi
            echo "EOF"
            echo "API_IMAGE_TAGS<<EOF"
            echo "${api_image}:latest"
            echo "${api_image}:sha-${short_sha}"
            if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
              echo "${api_image}:${GITHUB_REF_NAME}"
            fi
            echo "EOF"
          } >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build web image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ env.WEB_IMAGE_TAGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build api image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ env.API_IMAGE_TAGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
