name: E2E

on:
  pull_request:
    types: [labeled, synchronize, reopened]
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  playwright:
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-e2e')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: astral-sh/setup-uv@v5
      - run: pnpm install --frozen-lockfile
      - run: cp .env.example .env
      - run: docker compose up -d
      - run: uv sync --project apps/api --dev
      - run: pnpm --filter @prompteer/web exec playwright install --with-deps chromium
      - run: pnpm --filter @prompteer/web test:e2e
