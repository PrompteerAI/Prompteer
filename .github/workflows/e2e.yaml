name: E2E

on:
  pull_request:
    types: [labeled, synchronize, reopened]
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  playwright:
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-e2e')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: cp .env.example .env
      - run: scripts/compose-up.sh --build
      - run: make compose-health
      - name: Verify Compose health endpoints
        run: |
          curl --fail --silent --show-error http://localhost/api/v1/health/live
          curl --fail --silent --show-error http://localhost/api/v1/health/ready
          curl --fail --silent --show-error http://localhost/api/v1/health/startup
          curl --fail --location --silent --show-error http://localhost/
      - run: pnpm --filter @prompteer/web exec playwright install --with-deps chromium
      - name: Run Playwright against Compose
        run: pnpm --filter @prompteer/web test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost
      - name: Capture Compose logs
        if: always()
        run: |
          mkdir -p .verify
          docker compose ps > .verify/compose-ps.txt || true
          docker compose logs --no-color > .verify/compose.log || true
      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: e2e-artifacts
          if-no-files-found: ignore
          path: |
            .verify/compose-ps.txt
            .verify/compose.log
            apps/web/playwright-report/
            apps/web/test-results/
      - name: Stop Compose
        if: always()
        run: docker compose down -v
