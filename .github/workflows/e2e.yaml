name: E2E

on:
  pull_request:
  workflow_dispatch:

jobs:
  playwright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: docker compose up -d
      - run: pnpm --filter @prompteer/web exec playwright install --with-deps chromium
      - run: pnpm --filter @prompteer/web test:e2e
