name: E2E

on:
  push:
    branches: [main]
  pull_request:
    types: [labeled, synchronize, reopened]
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  playwright:
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-e2e')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Locate pnpm store
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('apps/api/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-
      - run: pnpm install --frozen-lockfile
      - run: uv sync --project apps/api --dev
      - run: cp .env.example .env
      - name: Configure CI host volume permissions
        run: echo "PROMPTEER_HOST_GID=$(id -g)" >> "$GITHUB_ENV"
      - run: scripts/compose-up.sh --build
      - run: make compose-health
      - name: Verify Compose health endpoints
        run: |
          curl --fail --silent --show-error http://localhost/api/v1/health/live
          curl --fail --silent --show-error http://localhost/api/v1/health/ready
          curl --fail --silent --show-error http://localhost/api/v1/health/startup
          curl --fail --location --silent --show-error http://localhost/
      - run: pnpm --filter @prompteer/web exec playwright install --with-deps chromium
      - name: Run Playwright against Compose
        run: pnpm --filter @prompteer/web test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost
      - name: Verify legacy-preview UI
        run: make verify-ui-legacy
      - name: Capture Compose logs
        if: always()
        run: |
          mkdir -p .verify
          docker compose ps > .verify/compose-ps.txt || true
          docker compose logs --no-color > .verify/compose.log || true
      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: e2e-artifacts
          if-no-files-found: ignore
          include-hidden-files: true
          path: |
            .verify/compose-ps.txt
            .verify/compose.log
            .verify/screenshots/legacy/
            .verify/screenshots/legacy-extra/
            apps/web/playwright-report/
            apps/web/test-results/
      - name: Stop Compose
        if: always()
        run: docker compose down -v
