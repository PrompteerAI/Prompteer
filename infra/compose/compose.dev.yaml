# Development Compose overlay used by AGENTS verification commands.
#
# The root compose.yaml already starts the full local stack. This overlay keeps
# the documented `docker compose -f compose.yaml -f infra/compose/compose.dev.yaml`
# command valid while reserving a stable place for future dev-only overrides.
services:
  api:
    environment:
      ENV: development
      LOG_JSON: "true"

  web:
    environment:
      ENV: development
