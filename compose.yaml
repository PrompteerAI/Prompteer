services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-prompteer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prompteer}
      POSTGRES_DB: ${POSTGRES_DB:-prompteer}
      TZ: UTC
      PGTZ: UTC
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sh:/docker-entrypoint-initdb.d/001-timezone.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    environment:
      APP_URL: http://localhost
      API_UVICORN_WORKERS: ${API_UVICORN_WORKERS:-1}
      API_UVICORN_WORKERS_MAX: ${API_UVICORN_WORKERS_MAX:-32}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-prompteer}:${POSTGRES_PASSWORD:-prompteer}@postgres:5432/${POSTGRES_DB:-prompteer}
      REDIS_URL: redis://redis:6379/0
      RATE_LIMIT_STORAGE_URL: redis://redis:6379/0
      AUTH_JWKS_URL: http://web:3000/api/auth/jwks
      AUTH_JWT_ISSUER: http://localhost
      AUTH_MOCK_GOOGLE_ISSUER: http://localhost
      AUTH_MOCK_GOOGLE_SERVER_BASE_URL: http://api:8000
      MOCK_MAILBOX_DIR: /tmp/prompteer/mock-email
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; [urllib.request.urlopen(url, timeout=2) for url in (''http://127.0.0.1:8000/api/v1/health/ready'', ''http://127.0.0.1:8000/api/v1/health/startup'')]"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-prompteer}:${POSTGRES_PASSWORD:-prompteer}@postgres:5432/${POSTGRES_DB:-prompteer}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      ["celery", "-A", "app.tasks.celery_app", "worker", "--loglevel=INFO"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "celery -A app.tasks.celery_app inspect ping -d celery@$${HOSTNAME} --timeout=5 | grep -q pong",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost/api/v1
      API_INTERNAL_URL: http://api:8000/api/v1
      AUTH_URL: http://localhost
      AUTH_JWT_ISSUER: http://localhost
      AUTH_MOCK_GOOGLE_ISSUER: http://localhost
      AUTH_MOCK_GOOGLE_DISCOVERY_URL: http://api:8000/.well-known/openid-configuration
      AUTH_MOCK_GOOGLE_SERVER_BASE_URL: http://api:8000
      HOSTNAME: 0.0.0.0
    depends_on:
      api:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1/api/v1/health/ready >/dev/null && wget -qO- http://127.0.0.1/api/v1/health/startup >/dev/null",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres-data:
