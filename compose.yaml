services:
  mock-mailbox:
    image: nginx:1.31-alpine@sha256:2f07d83bf561b506400dc183b1b2003803e39efbd22451f848adaba14d28c7c7
    command:
      [
        "/bin/sh",
        "-c",
        "mkdir -p /mock-email && chown 10001:${PROMPTEER_HOST_GID:-1000} /mock-email && chmod 0775 /mock-email",
      ]
    volumes:
      - ./.mock/email:/mock-email
    restart: "no"

  postgres:
    image: postgres:18@sha256:8ff36f3c66371cba71d20ceedccfc3de9669a68737607888c4ef0af93abe8e39
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-prompteer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prompteer}
      POSTGRES_DB: ${POSTGRES_DB:-prompteer}
      TZ: UTC
      PGTZ: UTC
    ports:
      - "${COMPOSE_BIND_HOST:-127.0.0.1}:${POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sh:/docker-entrypoint-initdb.d/001-timezone.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8@sha256:4d25e2fe601f7ffaeb4437cb6ced3518bc36edf34ebe98863c80836943d94529
    ports:
      - "${COMPOSE_BIND_HOST:-127.0.0.1}:${REDIS_PORT:-56379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    environment:
      APP_URL: "http://localhost:${HTTP_PORT:-80}"
      API_UVICORN_WORKERS: ${API_UVICORN_WORKERS:-1}
      API_UVICORN_WORKERS_MAX: ${API_UVICORN_WORKERS_MAX:-32}
      API_GUNICORN_TIMEOUT: ${API_GUNICORN_TIMEOUT:-30}
      API_GUNICORN_GRACEFUL_TIMEOUT: ${API_GUNICORN_GRACEFUL_TIMEOUT:-30}
      API_GUNICORN_KEEPALIVE: ${API_GUNICORN_KEEPALIVE:-2}
      LOG_JSON: "true"
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-prompteer}:${POSTGRES_PASSWORD:-prompteer}@postgres:5432/${POSTGRES_DB:-prompteer}
      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-5}
      DATABASE_MAX_OVERFLOW: ${DATABASE_MAX_OVERFLOW:-10}
      DATABASE_POOL_TIMEOUT: ${DATABASE_POOL_TIMEOUT:-30}
      REDIS_URL: redis://redis:6379/0
      RATE_LIMIT_STORAGE_URL: redis://redis:6379/0
      AUTH_JWKS_URL: http://web:3000/api/auth/jwks
      AUTH_JWT_ISSUER: "http://localhost:${HTTP_PORT:-80}"
      AUTH_MOCK_GOOGLE_ISSUER: "http://localhost:${HTTP_PORT:-80}"
      AUTH_MOCK_GOOGLE_SERVER_BASE_URL: http://api:8000
      MOCK_MAILBOX_DIR: /app/.mock/email
    volumes:
      - ./.mock/email:/app/.mock/email
    depends_on:
      mock-mailbox:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; [urllib.request.urlopen(url, timeout=2) for url in (''http://127.0.0.1:8000/api/v1/health/ready'', ''http://127.0.0.1:8000/api/v1/health/startup'')]"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-prompteer}:${POSTGRES_PASSWORD:-prompteer}@postgres:5432/${POSTGRES_DB:-prompteer}
      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-5}
      DATABASE_MAX_OVERFLOW: ${DATABASE_MAX_OVERFLOW:-10}
      DATABASE_POOL_TIMEOUT: ${DATABASE_POOL_TIMEOUT:-30}
      REDIS_URL: redis://redis:6379/0
      LOG_JSON: "true"
      MOCK_MAILBOX_DIR: /app/.mock/email
    volumes:
      - ./.mock/email:/app/.mock/email
    depends_on:
      mock-mailbox:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      ["celery", "-A", "app.tasks.celery_app", "worker", "--loglevel=INFO"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "celery -A app.tasks.celery_app inspect ping -d celery@$${HOSTNAME} --timeout=5 | grep -q pong",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      ENV: ${ENV:-development}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      NEXT_PUBLIC_APP_VERSION: ${NEXT_PUBLIC_APP_VERSION:-0.1.0}
      APP_URL: "http://localhost:${HTTP_PORT:-80}"
      NEXT_PUBLIC_API_URL: "http://localhost:${HTTP_PORT:-80}/api/v1"
      NEXT_PUBLIC_USE_MOCK_GOOGLE: ${NEXT_PUBLIC_USE_MOCK_GOOGLE:-true}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
      API_INTERNAL_URL: http://api:8000/api/v1
      AUTH_SECRET: ${AUTH_SECRET:-dev-auth-secret-change-in-production}
      AUTH_URL: "http://localhost:${HTTP_PORT:-80}"
      AUTH_JWT_ISSUER: "http://localhost:${HTTP_PORT:-80}"
      AUTH_JWT_AUDIENCE: ${AUTH_JWT_AUDIENCE:-prompteer-api}
      AUTH_JWT_PRIVATE_KEY: ${AUTH_JWT_PRIVATE_KEY:-}
      AUTH_JWT_KEY_ID: ${AUTH_JWT_KEY_ID:-prompteer-dev-auth}
      AUTH_MOCK_GOOGLE_ISSUER: "http://localhost:${HTTP_PORT:-80}"
      AUTH_MOCK_GOOGLE_DISCOVERY_URL: http://api:8000/.well-known/openid-configuration
      AUTH_MOCK_GOOGLE_SERVER_BASE_URL: http://api:8000
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      AUTH_ALLOW_SEED_LOGIN: ${AUTH_ALLOW_SEED_LOGIN:-true}
      ENABLE_DEV_ROUTES: ${ENABLE_DEV_ROUTES:-true}
      HOSTNAME: 0.0.0.0
    depends_on:
      api:
        condition: service_healthy

  nginx:
    image: nginx:1.31-alpine@sha256:2f07d83bf561b506400dc183b1b2003803e39efbd22451f848adaba14d28c7c7
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    ports:
      - "${COMPOSE_BIND_HOST:-127.0.0.1}:${HTTP_PORT:-80}:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1/api/health >/dev/null && wget -qO- http://127.0.0.1/api/v1/health/ready >/dev/null && wget -qO- http://127.0.0.1/api/v1/health/startup >/dev/null",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres-data:
